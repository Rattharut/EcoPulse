<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>EcoPulse-Result</title>
    <link rel="stylesheet" href="Reset.css">
    <link rel="stylesheet" href="main-3.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@400..700&family=Smooch+Sans:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="smooch-text">

    <section>
    <main class="wrap">
        <section class="card" aria-label="EcoPulse quiz">
            
            <div class="header">
                <div class="brand">
                    <div class="brand-text logo-H caveat-text" style="margin-left:-4px;">
                        <span>EcoPulse<i class="fa-solid fa-heart-pulse icon-Logo "></i></span>
                    </div>
                </div>
                <span class="top-count" id="topCount">10 / 10</span>
            </div>

            <span class="q-label Avata-text-p" style="text-align:center; margin-bottom: -4px;">Your Result</span>
            
            <h1 style="text-align:center;  margin-bottom: 8px;" class="q-text Avata-text-p" id="resultCharacterName">Loading...</h1>

            <div style="display:block; margin:auto; " class="Avata-player">
                <img  class="Avata-photo" id="resultCharacterImg" src="image/Eco Rookie AI.png" alt="Avata">
            </div>

            <div class="progress">
                <div class="progress-meta">
                    <span class="left">Question <span class="qn">10</span> of 10</span>
                    <span class="right">100% Complete</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progFill" style="width:100%"></div>
                </div>
            </div>

            <div class="nav">
                <button class="btn btn-outline" id="prevBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Previous
                </button>
                <button class="btn btn-primary" id="nextBtn">
                  <a style="color: white; text-decoration:none;" href="Web-choice.html">Reset</a>  
                </button>
            </div>
        </section>
    </main>
    </section>

    <script>

    window.addEventListener('DOMContentLoaded', () => {
    const middleY = document.body.scrollHeight / 2 - window.innerHeight / 2;
    window.scrollTo({top: middleY,behavior: 'auto'})
    ;});
    
        window.addEventListener('DOMContentLoaded', () => {
            const finalScore = parseInt(localStorage.getItem('ecoPulseScore')) || 0;
        
            const characterNameText = document.getElementById('resultCharacterName');
            const characterImg = document.getElementById('resultCharacterImg');

            if (finalScore <= 6) {
                // เกณฑ์ต่ำ: 0 - 6 คะแนน
                characterNameText.textContent = "You are Trash Monster";
                characterImg.src = "image/Trash Monster AI.png"; 
            } 
            else if (finalScore <= 14) {
                // เกณฑ์กลาง: 7 - 14 คะแนน
                characterNameText.textContent = "You are Eco Rookie";
                characterImg.src = "image/Eco Rookie AI.png"; 
            } 
            else {
                // เกณฑ์สูง: 15 - 20 คะแนน
                characterNameText.textContent = "You are Planet Savior";
                characterImg.src = "image/Planet Savior AI.png"; 
            }
        });
    </script>
</body>
</html>
